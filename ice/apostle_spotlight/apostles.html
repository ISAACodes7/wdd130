<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            
        }
        #fp{

            overflow: hidden;
            display: flex;
            gap: 25px;
            align-items: center;
            justify-content: center;
            
        }
        #card{
            color:white;
            max-width: 800px;
            margin: 0 auto;
            height: 500px;
            border: 5px black solid;
            border-radius: 20px;
            background-image: url('images/christus.webp');
            width: 100%;
            background-size: cover;
            text-align: center;
            overflow: hidden;
            object-position: left;
        }

            
        
        .largeimg{
            object-position: top;
            object-fit: cover;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 5px white solid;
            background-size: cover;
        }
        .medimg{
            object-position: top;
            object-fit: cover;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 5px white solid;
            background-size: cover;
        }
        .smallimg{
            object-position: top;
            object-fit: cover;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 5px white solid;
            background-size: cover;
        }
        #q12{
            display: grid;
            grid-template-columns: repeat(4, 85px);
            overflow: hidden;
            gap: 25px;
            align-items: center;
            justify-content: center;
        }
        img:hover{
            border: 5px rgb(126, 126, 195) solid;
        }
    </style>
</head>
<body>
    <div id = "card">
        <h1>First Presidency</h1>
        <div id ="fp" >

            <img class = "medimg" src="images/eyring.webp" alt="Eyring">
            <img class = "largeimg" src="images/oaks.webp" alt="Oaks">
            <img class = "medimg" src="images/christofferson.webp" alt="Christofferson">


        </div>
            <h2>Quorum of the Twelve Apostles</h2>
        <div id = "q12">
            
            <img class = "smallimg" src="images/uchtdorf.webp" alt="Uctdorf">
            <img class = "smallimg" src="images/bednar.webp" alt="">
            <img class = "smallimg" src="images/cook.webp" alt="cook">
            <img class = "smallimg" src="images/anderson.webp" alt="Anderson">

            <img class = "smallimg" src="images/rasband.webp" alt="Rasband">
            <img class = "smallimg" src="images/stevenson.webp" alt="Stevenson">
            <img class = "smallimg" src="images/renlund.webp" alt="Renlund">
            <img class = "smallimg" src="images/gong.webp" alt="Gong">

            <img class = "smallimg" src="images/soares.webp" alt="Soares">
            <img class = "smallimg" src="images/kearon.webp" alt="Kearon">
            <img class = "smallimg" src="images/causse.webp" alt = "causse">
            <img class = "smallimg" src="images/clark_g_gilbert.jpeg" alt="Gilbert">
        </div>
    </div>
    <!-- Insert HTML elements here -->
</body>
</html>
